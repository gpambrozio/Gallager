name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow friction, not just the solution — it helps find the best fix.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to happen?
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Where does this belong?
      multiple: true
      options:
        - Mac app
        - iOS app
        - Relay server
        - CLI (gallager)
        - Plugins / agent support
        - Website / docs
        - Not sure
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives or workarounds you've considered
