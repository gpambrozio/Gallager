services:
  relay:
    build: .
    container_name: claudespy-relay
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - PAIRING_CODE_EXPIRY_SECONDS=${PAIRING_CODE_EXPIRY_SECONDS:-300}
      # Licensing (hosted-relay monetization) — leave BOTH unset for self-hosting.
      # Setting only one of the two ids fails the boot on purpose.
      # A present but non-integer value in any licensing var also fails boot.
      - LEMONSQUEEZY_STORE_ID=${LEMONSQUEEZY_STORE_ID:-}
      - LEMONSQUEEZY_PRODUCT_ID=${LEMONSQUEEZY_PRODUCT_ID:-}
      - TRIAL_DAYS=${TRIAL_DAYS:-7}
      - LICENSE_REVALIDATE_HOURS=${LICENSE_REVALIDATE_HOURS:-24}
      - LICENSE_GRACE_DAYS=${LICENSE_GRACE_DAYS:-7}
      - DATA_DIRECTORY=/data
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      # APNs configuration - set these for push notification support
      # Get these values from your Apple Developer account
      - APNS_KEY_PATH=${APNS_KEY_PATH:-/secrets/AuthKey.p8}
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-}
      # APNs environment: "development" for Xcode builds, "production" for App Store/TestFlight
      - APNS_ENVIRONMENT=${APNS_ENVIRONMENT:-development}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    volumes:
      - ./data:/data
      # Mount secrets directory for APNs key (read-only)
      # Place your AuthKey_XXXXXXXXXX.p8 file in ./secrets/AuthKey.p8
      - ./secrets:/secrets:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
