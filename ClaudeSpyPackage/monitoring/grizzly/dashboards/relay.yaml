            "y": 0
          id: 3
          options:
            colorMode: background
            orientation: auto
            reduceOptions:
                calcs:
                    - lastNotNull
            textMode: auto
          targets:
            - datasource:
                uid: grafanacloud-prom
              expr: claudespy_ws_connections{device_type="viewer"}
